---
deployment:
  tasks:
    - export: DEPLOYPATH=/home/ilawnum/public_html
    - find: $DEPLOYPATH -maxdepth 1 -type f -delete
    - find: $DEPLOYPATH -mindepth 1 -delete
    - run: |
        git clone --depth 1 --branch master https://github.com/dyseyha68-maker/numilaw.git tempdeploy
        cp -r tempdeploy/* $DEPLOYPATH/
        rm -rf tempdeploy
    - run: |
        cd $DEPLOYPATH && php artisan config:cache 2>/dev/null || true
    - run: |
        cd $DEPLOYPATH && php artisan view:cache 2>/dev/null || true